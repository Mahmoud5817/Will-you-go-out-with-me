<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hey jafar 👀</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#f5f0e8;overflow:hidden;font-family:'Comic Neue',cursive;}
canvas{position:fixed;top:0;left:0;pointer-events:none;}
#stars{z-index:0;}#fw{z-index:1;}#cf{z-index:2;}
.page{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity 0.6s,transform 0.6s;padding:1rem;overflow-y:auto;}
.page.out{opacity:0;transform:scale(0.95);pointer-events:none;}
#p1 .trophy{font-size:90px;display:block;animation:float 2s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
#p1 .title{font-family:'Bangers',cursive;font-size:48px;color:#222;letter-spacing:3px;text-align:center;margin:0.5rem 0 0.2rem;text-shadow:2px 2px 0 #c9a800;}
#p1 .sub{color:#888;font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:1.5rem;}
.clap-wrap{position:relative;display:inline-block;}
.clap-btn{font-size:95px;border:none;background:none;cursor:pointer;display:block;animation:clapwiggle 1.2s ease-in-out infinite;line-height:1;}
@keyframes clapwiggle{0%,100%{transform:rotate(-8deg) scale(1)}50%{transform:rotate(8deg) scale(1.08)}}
.ring{position:absolute;inset:-20px;border-radius:50%;border:2px solid rgba(200,160,0,0.4);animation:ringpulse 1.4s ease-out infinite;}
.ring2{animation-delay:0.45s;border-color:rgba(200,160,0,0.2);}
@keyframes ringpulse{0%{transform:scale(0.85);opacity:1}100%{transform:scale(1.7);opacity:0}}
.tap-hint{color:#bbb;font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-top:1.2rem;}
#p2{justify-content:flex-start;padding-top:2rem;padding-bottom:2rem;}
#p2 .eyeemoji{font-size:50px;margin-bottom:0.2rem;animation:float 2s ease-in-out infinite;}
#p2 .main-title{font-family:'Bangers',cursive;font-size:54px;color:#222;letter-spacing:4px;line-height:1;text-shadow:2px 2px 0 #c0392b;margin-bottom:0.2rem;}
#p2 .sub2{color:#999;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:1.2rem;}
.card{background:#fff;border:1.5px solid #e0d8cc;border-radius:24px;padding:1.6rem 1.6rem 1.4rem;width:min(420px,92vw);box-shadow:0 4px 30px rgba(0,0,0,0.06);}
.q-text{font-family:'Bangers',cursive;font-size:36px;color:#222;letter-spacing:2px;margin-bottom:1.2rem;line-height:1.1;}
.btn-grid{display:flex;flex-direction:column;gap:9px;margin-bottom:1.2rem;}
.ansbtn{font-family:'Comic Neue',cursive;font-weight:700;font-size:16px;padding:13px 20px;border-radius:999px;border:none;cursor:pointer;letter-spacing:1px;transition:transform 0.15s;}
.ansbtn:active{transform:scale(0.94)!important;}
.btn-yes{background:linear-gradient(135deg,#FFD700,#ff9500);color:#2c1a00;animation:btnshine 2s ease-in-out infinite;}
@keyframes btnshine{0%,100%{box-shadow:0 4px 20px rgba(255,180,0,0.3)}50%{box-shadow:0 4px 40px rgba(255,180,0,0.7)}}
.btn-ar{background:linear-gradient(135deg,#00b894,#00cec9);color:#003028;}
.btn-si{background:linear-gradient(135deg,#fd79a8,#e84393);color:#fff;}
.field-label{font-family:'Bangers',cursive;font-size:18px;color:#555;letter-spacing:1px;margin-bottom:6px;display:block;text-align:left;}
.field-input{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid #e0d8cc;font-family:'Comic Neue',cursive;font-weight:700;font-size:15px;color:#222;background:#faf8f4;outline:none;margin-bottom:12px;transition:border-color 0.2s;}
.field-input:focus{border-color:#FFD700;}
.field-input::placeholder{color:#bbb;font-weight:400;}
.datetime-row{display:flex;gap:8px;}
.datetime-row .field-input{flex:1;margin-bottom:0;}
.submit-btn{width:100%;margin-top:14px;font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;padding:14px;border-radius:999px;border:none;cursor:pointer;background:linear-gradient(135deg,#FFD700,#ff9500);color:#2c1a00;transition:transform 0.15s,opacity 0.2s;animation:btnshine 2s ease-in-out infinite;}
.submit-btn:active{transform:scale(0.96);}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;animation:none;}
.divider{height:1px;background:#e8e0d0;margin:1rem 0;}
.result-overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;opacity:0;pointer-events:none;transition:opacity 0.5s;padding:1rem;background:#f5f0e8;}
.result-overlay.show{opacity:1;pointer-events:all;}
.result-card{background:#fff;border:1.5px solid #e0d8cc;border-radius:28px;padding:2.5rem 2rem;text-align:center;max-width:380px;width:90vw;box-shadow:0 8px 40px rgba(0,0,0,0.08);animation:resultpop 0.6s cubic-bezier(.17,.67,.35,1.5) forwards;transform:scale(0.5);}
@keyframes resultpop{to{transform:scale(1)}}
.result-emoji{font-size:64px;display:block;margin-bottom:0.6rem;}
.result-top{font-family:'Bangers',cursive;font-size:42px;letter-spacing:3px;color:#222;margin-bottom:0.4rem;}
.result-sub{color:#666;font-size:15px;line-height:1.6;}
.result-details{margin-top:1.2rem;background:#faf8f4;border-radius:14px;padding:1rem;text-align:left;border:1px solid #e8e0d0;}
.result-details p{font-size:14px;color:#555;margin-bottom:4px;font-weight:700;}
.result-details span{color:#222;font-size:15px;}
.floating-emoji{position:fixed;font-size:30px;pointer-events:none;z-index:50;animation:floatup 2.5s ease-out forwards;}
@keyframes floatup{0%{transform:translateY(0) rotate(0) scale(1);opacity:1}100%{transform:translateY(-80vh) rotate(30deg) scale(0.3);opacity:0}}
</style>
</head>

  let clapDone=false, chosenLang='yes', chosenLabel='Yes';

  function playCheer(){
    const audio=document.getElementById('crowd-audio');
    audio.currentTime=0;
    audio.volume=1.0;
    audio.play().catch(()=>{});
  }

  const sc=document.getElementById('stars'),sctx=sc.getContext('2d');
  const fwc=document.getElementById('fw'),fwctx=fwc.getContext('2d');
  const cfc=document.getElementById('cf'),cfctx=cfc.getContext('2d');
  function rsz(){[sc,fwc,cfc].forEach(c=>{c.width=innerWidth;c.height=innerHeight;});}
  rsz();window.addEventListener('resize',rsz);
  const stars=Array.from({length:80},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.4+.3,a:Math.random(),s:Math.random()*.006+.002}));
  (function drawS(){sctx.clearRect(0,0,sc.width,sc.height);stars.forEach(s=>{s.a+=s.s;if(s.a>1||s.a<0)s.s*=-1;sctx.beginPath();sctx.arc(s.x*sc.width,s.y*sc.height,s.r,0,Math.PI*2);sctx.fillStyle='rgba(180,150,80,'+s.a*0.4+')';sctx.fill();});requestAnimationFrame(drawS);})();

  let parts=[],fwOn=false,fwInt;
  function firework(){
    const x=Math.random()*fwc.width,y=Math.random()*fwc.height*.45+40;
    const cols=['#FFD700','#ff4757','#2ed573','#ff6b81','#a29bfe','#fd79a8'];
    const col=cols[Math.floor(Math.random()*cols.length)];
    for(let i=0;i<65;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*7+2;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col,r:Math.random()*3+1});}
  }
  (function animFw(){
    if(!fwOn){fwctx.clearRect(0,0,fwc.width,fwc.height);requestAnimationFrame(animFw);return;}
    fwctx.fillStyle='rgba(245,240,232,0.15)';fwctx.fillRect(0,0,fwc.width,fwc.height);
    parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.016;p.vx*=.98;
      fwctx.beginPath();fwctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
      fwctx.fillStyle=p.col+Math.floor(p.life*255).toString(16).padStart(2,'0');fwctx.fill();return p.life>0;});
    requestAnimationFrame(animFw);
  })();
  function startFw(){fwOn=true;firework();fwInt=setInterval(firework,500);setTimeout(()=>{clearInterval(fwInt);fwOn=false;},7000);}

  function launchConfetti(){
    const ps=Array.from({length:130},()=>({x:Math.random()*cfc.width,y:Math.random()*-400,r:Math.random()*8+3,d:Math.random()*80+20,col:['#FFD700','#ff4757','#2ed573','#1e90ff','#ff6b81','#a29bfe'][Math.floor(Math.random()*6)],tilt:Math.random()*10-5,ts:Math.random()*.1+.04,shape:Math.random()>.5?'r':'c'}));
    let a=0,f=0;
    const an=setInterval(()=>{cfctx.clearRect(0,0,cfc.width,cfc.height);a+=.01;f++;
      ps.forEach(p=>{p.tilt+=p.ts;p.y+=Math.cos(a+p.d)+2.8;p.x+=Math.sin(a)*.9;cfctx.fillStyle=p.col;
        if(p.shape==='r'){cfctx.save();cfctx.translate(p.x,p.y);cfctx.rotate(p.tilt);cfctx.fillRect(-p.r/2,-p.r/2,p.r*2,p.r);cfctx.restore();}
        else{cfctx.beginPath();cfctx.ellipse(p.x,p.y,p.r,p.r/2,p.tilt,0,Math.PI*2);cfctx.fill();}
        if(p.y>cfc.height){p.y=-20;p.x=Math.random()*cfc.width;}});
      if(f>380){clearInterval(an);cfctx.clearRect(0,0,cfc.width,cfc.height);}},16);
  }

  function spawnEmojis(){
    const em=['🎉','💕','✨','🥰','💫','🌟','❤️','🎊','👑','🔥'];
    for(let i=0;i<16;i++)setTimeout(()=>{
      const el=document.createElement('div');el.className='floating-emoji';
      el.textContent=em[Math.floor(Math.random()*em.length)];
      el.style.cssText='left:'+Math.random()*88+'vw;bottom:'+(5+Math.random()*15)+'vh;animation-duration:'+(2+Math.random()*2)+'s;';
      document.body.appendChild(el);setTimeout(()=>el.remove(),4000);},i*130);
  }

  function doClap(){
    if(clapDone)return;clapDone=true;
    playCheer();
    const btn=document.getElementById('clapbtn');
    btn.style.transform='scale(2) rotate(-25deg)';btn.style.animation='none';
    setTimeout(()=>{document.getElementById('p1').classList.add('out');setTimeout(()=>document.getElementById('p2').classList.remove('out'),100);},700);
  }

  const resData={
    yes:{e:'🎉',t:'YESSSSS!!',s:'ok cool totally normal 😅<br>mahmoud is SO proud 👏'},
    arabic:{e:'🌙',t:'!نعم نعم نعم',s:'bilingual king 👑<br>mahmoud says ماشاء الله 👏'},
    si:{e:'💃',t:'SÍÍÍÍ!!',s:'muy romántico jafar 😍<br>mahmoud says olé 👏'}
  };
  const langLabels={yes:'Yes 🥰',arabic:'نعم 🌙',si:'Sí 💃'};

  function pickYes(lang){
    chosenLang=lang;
    chosenLabel=langLabels[lang];
    document.getElementById('btn-grid').style.display='none';
    document.getElementById('fields').style.display='block';
    playCheer();
  }

  function formatTime(t){
    const [h,m]=t.split(':').map(Number);
    const ampm=h>=12?'PM':'AM';
    const hr=h%12||12;
    return hr+':'+(m<10?'0':'')+m+' '+ampm;
  }

  function submitDate(){
    const activity=document.getElementById('activity').value.trim();
    const date=document.getElementById('dateVal').value;
    const time=document.getElementById('timeVal').value;
    if(!activity){
      document.getElementById('activity').focus();
      document.getElementById('activity').style.borderColor='#ff4757';
      return;
    }
    const btn=document.getElementById('submit-btn');
    btn.disabled=true;
    btn.textContent='Sending... 📨';
    const d=date?new Date(date+'T00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}):'Not specified';
    const t=time?formatTime(time):'Not specified';
    emailjs.send('service_06a2bnb','template_mpxsz7u',{
      to_email:'mmohamed2@mcneese.edu',
      answer:chosenLabel,
      activity:activity,
      date:d,
      time:t
    }).then(()=>{
      showResult(activity,d,t);
    }).catch((err)=>{
      console.error('EmailJS error:',err);
      showResult(activity,d,t);
    });
  }

  function showResult(activity,d,t){
    const r=resData[chosenLang];
    document.getElementById('remoji').textContent=r.e;
    document.getElementById('rtop').textContent=r.t;
    document.getElementById('rsub').innerHTML=r.s;
    let details='<p>🎯 activity</p><span>'+activity+'</span>';
    details+='<br><br><p>📅 date</p><span>'+d+'</span>';
    details+='<br><br><p>⏰ time</p><span>'+t+'</span>';
    details+='<br><br><p>💬 answered in</p><span>'+chosenLabel+'</span>';
    document.getElementById('rdetails').innerHTML=details;
    document.getElementById('p2').classList.add('out');
    setTimeout(()=>document.getElementById('result').classList.add('show'),200);
    playCheer();launchConfetti();startFw();spawnEmojis();
  }
</script>
</body>
</html>
